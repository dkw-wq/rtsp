# RTSP Player Configuration

# RTSP流地址
rtsp_url: "rtsp://127.0.0.1:8554/webcam"

# 视频参数 (通常由RTSP流自动检测，这里仅作默认值)
width: 1920
height: 1080

# RTSP连接参数
rtsp:
  # 传输方式: tcp, udp
  transport: "tcp"
  # 连接和读写超时(毫秒)
  timeout_ms: 5000
  # FFmpeg输入缓冲区大小(字节)
  buffer_size: 262144
  # 低延迟模式会启用 nobuffer/low_delay，并缩短探测和重排序等待。
  low_latency:
    enabled: true
    max_delay_ms: 50
    analyze_duration_ms: 0
    probe_size_bytes: 32768
    reorder_queue_size: 0

# Jitter Buffer设置
jitter_buffer:
  max_size: 30      # 最大缓冲帧数
  latency_ms: 100   # 目标延迟(毫秒)

# 音频播放设置
audio:
  enabled: true
  target_latency_ms: 30
  max_queue_ms: 800
  hard_reset_queue_ms: 1500

# 音视频同步设置：以音频时钟为主时钟
sync:
  enabled: true   # AI不要改，只手工改
  max_wait_ms: 16
  late_drop_ms: 250

# 断线重连设置
reconnect:
  enabled: true
  initial_delay_ms: 1000
  max_delay_ms: 5000

# 日志级别: trace, debug, info, warn, error, critical
log_level: "info"

# 渲染后端: sdl, opengl, vulkan
renderer: "vulkan"

# 硬件解码: none, cuda
hw_decode: "cuda"

# OpenGL shader滤镜管线: none, grayscale, warm, invert, contrast, saturation
opengl_filters:
  - warm
  - contrast
